<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="confetti-container"></div>

    <div class="container">
        <header>
            <div class="header-top">
                <h1>📝 My To-Do List</h1>
                <button id="darkModeToggle" class="dark-mode-btn">🌙</button>
            </div>
            <p>Stay organized and get things done!</p>
            <div class="task-stats">
                <span class="stat">📋 Total: <strong id="totalTasks">0</strong></span>
                <span class="stat">✅ Done: <strong id="completedTasks">0</strong></span>
                <span class="stat">⏳ Pending: <strong id="pendingTasks">0</strong></span>
            </div>
        </header>

        <section class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Enter a new task..."
                >
                <select id="prioritySelect">
                    <option value="low">🟢 Low</option>
                    <option value="medium" selected>🟡 Medium</option>
                    <option value="high">🔴 High</option>
                </select>
                <button id="addButton">Add Task</button>
            </div>
            <div class="search-group">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="🔍 Search tasks..."
                >
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>
        </section>

        <section class="task-display">
            <h2>Your Tasks</h2>
            <ul id="taskList">
                <li class="empty-state">
                    <p>No tasks yet. Add one to get started! 🚀</p>
                </li>
            </ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
